<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roni Andika Syahputra - Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">
    <div class="container mx-auto px-4 py-10">
        <div class="text-center relative">
            <h1 class="text-4xl font-bold text-orange-500">Selamat Datang!</h1>
            <p class="text-lg mt-2">Halo, saya Roni Andika Syahputra, mahasiswa Pendidikan Teknologi Informasi.</p>
            
            <div class="relative w-40 h-40 mx-auto mt-4">
                <img id="profileImage" src="profil.jpg" alt="Foto Profil Roni" class="w-40 h-40 mx-auto rounded-full border-4 border-orange-500 shadow-lg">
                <label for="profileInput" class="absolute bottom-0 right-0 bg-orange-500 text-white p-2 rounded-full cursor-pointer shadow-md hover:bg-orange-600 transition">
                    📷
                </label>
                <input type="file" id="profileInput" accept="image/*" class="hidden">
            </div>
        </div>
        
        <div class="mt-10 bg-gray-800 p-6 rounded-lg shadow-lg max-w-lg mx-auto">
            <h2 class="text-2xl font-semibold border-b border-gray-600 pb-2">About Me</h2>
            <p class="mt-2"><strong>Prodi:</strong> Pendidikan Teknologi Informasi</p>
            <p><strong>Nama:</strong> Roni Andika Syahputra</p>
            <p><strong>NPM:</strong> 2413025054</p>
            <p><strong>Kelas:</strong> 2024B</p>
        </div>
        
        <div class="text-center mt-6">
            <a href="https://www.instagram.com/str_dust07?igsh=aHZvOTllenh3Ynd3" target="_blank" rel="noopener noreferrer" 
               class="bg-orange-500 text-white px-6 py-2 rounded-full text-lg shadow-lg hover:bg-orange-600 transition transform hover:scale-105 active:scale-95 transition duration-300 ease-in-out">Visit My Instagram</a>
        </div>
        
        <div class="mt-10 max-w-lg mx-auto">
            <h3 class="text-2xl font-semibold text-orange-400">Tugas Grafika Komputer</h3>
            <ul class="mt-2 text-gray-300">
                <li class="bg-gray-700 p-2 rounded-lg shadow mt-2 transform hover:scale-105 active:scale-95 transition duration-300 ease-in-out transition">- Tugas Pertemuan 1</li>
            </ul>
        </div>
    </div>
    
    <script>
        // Cek apakah ada foto profil yang tersimpan di localStorage
        if (localStorage.getItem('profileImage')) {
            document.getElementById('profileImage').src = localStorage.getItem('profileImage');
        }

        document.getElementById('profileInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profileImage').src = e.target.result;
                    localStorage.setItem('profileImage', e.target.result); // Simpan gambar di localStorage
                }
                reader.readAsDataURL(file);
            }
        });
    </script>
</body>
</html>
